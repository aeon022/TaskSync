      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Shell -->
  <rect width="512" height="512" rx="128" fill="#050505"/>
  <rect x="2" y="2" width="508" height="508" rx="126" stroke="url(#mauveGradient)" stroke-width="4" stroke-opacity="0.2"/>
  
