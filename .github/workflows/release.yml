name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build Binary
        run: |
          pyinstaller utask.spec
          
      - name: Rename Binary
        run: |
          mv dist/utask dist/utask-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/utask-macos
            dist/utask-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
